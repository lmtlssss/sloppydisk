name: release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  publish:
    if: >-
      ${{ github.event_name != 'push' || (github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip ci]')) }}
    runs-on: ubuntu-latest

    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Set Up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Build Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libcap-dev

      - name: Resolve Release Targets
        id: support
        run: node scripts/release-targets.cjs --github-output

      - name: Read Npm Version
        id: npm_version
        run: |
          echo "version=$(npm view slopex-cli version 2>/dev/null || true)" >> "$GITHUB_OUTPUT"

      - name: Choose Package Version
        id: version
        env:
          PUBLISHED_VERSION: ${{ steps.npm_version.outputs.version }}
        run: node scripts/bump-release-version.cjs --github-output

      - name: Install Matching Codex
        run: npm install -g "@openai/codex@${{ steps.support.outputs.codex_version }}"

      - name: Build Patched Artifact
        run: npm run build-release-artifact

      - name: Smoke Test Packaged Install
        run: npm run smoke:packaged

      - name: Stage Release Asset
        run: |
          mkdir -p dist
          cp "$HOME/.slopex/artifacts/${{ steps.support.outputs.codex_version }}/${{ steps.support.outputs.platform_key }}/codex" "dist/${{ steps.support.outputs.asset_name }}"
          chmod +x "dist/${{ steps.support.outputs.asset_name }}"

      - name: Commit Release Version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          if ! git diff --cached --quiet; then
            git commit -m "release: v${{ steps.version.outputs.next }} [skip ci]"
          fi
          git push origin HEAD:main

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ steps.version.outputs.next }}" >/dev/null 2>&1; then
            gh release upload "v${{ steps.version.outputs.next }}"               "dist/${{ steps.support.outputs.asset_name }}"               --clobber
          else
            gh release create "v${{ steps.version.outputs.next }}"               "dist/${{ steps.support.outputs.asset_name }}"               --target "$(git rev-parse HEAD)"               --title "v${{ steps.version.outputs.next }}"               --notes "Automated release for slopex v${{ steps.version.outputs.next }}"
          fi

      - name: Publish To Npm
        run: |
          if npm view "slopex-cli@${{ steps.version.outputs.next }}" version >/dev/null 2>&1; then
            echo "slopex-cli@${{ steps.version.outputs.next }} is already published; skipping npm publish."
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
